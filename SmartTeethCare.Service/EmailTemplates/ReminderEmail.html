<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background:#fff8e1;font-family:Arial">

    <div style="max-width:600px;margin:auto;background:white;padding:25px;border-radius:12px;">

        <h2 style="color:#2c3e50;text-align:center;">🦷 Smart Teeth Care</h2>

        <h3 style="color:#f39c12;">⏰ Appointment Reminder</h3>

        <p>Dear Patient,</p>

        <p>
            This is a friendly reminder for your upcoming appointment 💙
        </p>

        <div style="background:#fff3cd;padding:15px;border-radius:8px;">
            <p><b>📅 Date:</b> {DATE}</p>
            <p><b>👨‍⚕️ Doctor:</b> {DOCTOR}</p>
        </div>

        <p>
            We kindly ask you to arrive on time.
            Your smile is our priority 😊
        </p>

        <p style="color:#7f8c8d;text-align:center;font-size:12px;">
            Smart Teeth Care Team
        </p>

    </div>

</body>
</html>
